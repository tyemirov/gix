common:
  log_level: error
  log_format: console
  assume_yes: false
  require_clean: false

operations:
  - command: ["audit"]
    with:
      roots:
        - .
  - command: ["packages", "delete"]
    with:
      roots:
        - .
  - command: ["prs", "delete"]
    with:
      remote: origin
      limit: 100
      roots:
        - .
  - command: ["remote", "update-to-canonical"]
    with:
      roots:
        - .
      owner: ""
  - command: ["remote", "update-protocol"]
    with:
      roots:
        - .
  - command: ["files", "rm"]
    with:
      roots:
        - .
      remote: ""
      push: true
      restore: true
      push_missing: false
  - command: ["folder", "rename"]
    with:
      roots:
        - .
      include_owner: false
  - command: ["release"]
    with:
      roots:
        - .
      remote: origin
  - command: ["workflow"]
    with:
      roots:
        - .
  - command: ["default"]
    with:
      roots:
        - .
  - command: ["sync"]
    with:
      roots:
        - .
      remote: origin
  - command: ["message", "commit"]
    with:
      roots:
        - .
      provider: openai_compatible
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      model: gpt-4.1
      diff_source: staged
      max_completion_tokens: 256
      temperature: 0
      timeout_seconds: 60
  - command: ["message", "changelog"]
    with:
      roots:
        - .
      provider: openai_compatible
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      model: gpt-4.1
      max_completion_tokens: 1200
      temperature: 0
      timeout_seconds: 60
